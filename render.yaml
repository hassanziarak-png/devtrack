services:
  - type: web
    name: devtrack
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: SECRET_KEY
        generateValue: true
      - key: EMAIL_ENABLED
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: devtrack-db
          property: connectionString

databases:
  - name: devtrack-db
    plan: free
